kind = "web"
previewPath = "/"
title = "Counselor Portal"
version = "1.0.0"
id = "artifacts/counselor-portal"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25887

[services.development]
run = "pnpm --filter @workspace/counselor-portal run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/counselor-portal", "run", "build" ]
publicDir = "artifacts/counselor-portal/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25887"
BASE_PATH = "/"
